<div class="page-header">
  <div>
    <div class="page-title">
      {{ isEditing ? 'Edit Expense' : 'Add Expense' }}
      <span *ngIf="id" class="badge badge-warning" style="margin-left: 0.5rem;">Editing</span>
    </div>
    <div class="page-subtitle">Fill in the details below</div>
  </div>
  <button type="button" class="btn btn-secondary" (click)="goBack()">Back</button>
</div>

<form [formGroup]="expenseForm" (ngSubmit)="onSubmit()" *ngIf="expenseForm">
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" formControlName="Title" />
        <small class="error-message"
          *ngIf="expenseForm.controls['Title'].invalid && expenseForm.controls['Title'].touched">
          Title is required (min. 3 characters).
        </small>
      </div>
      <div class="form-group">
        <label>Date of Emission</label>
        <input type="date" formControlName="DateOfEmission" />
        <small class="error-message"
          *ngIf="expenseForm.controls['DateOfEmission'].invalid && expenseForm.controls['DateOfEmission'].touched">
          Please enter a valid date.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Amount (€)</label>
        <input type="number" formControlName="Amount" />
        <small class="error-message"
          *ngIf="expenseForm.controls['Amount'].invalid && expenseForm.controls['Amount'].touched">
          Amount must be greater than zero.
        </small>
      </div>
      <div class="form-group">
        <label>NIF</label>
        <input type="number" id="tin" formControlName="Tin" [required]="false"/>
        <small class="error-message" *ngIf="expenseForm.controls['Tin'].invalid && expenseForm.controls['Tin'].touched">
          Must have 9 numbers.
        </small>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Expense Type</label>
        <select formControlName="ExpenseTypeId" id="ExpenseTypeId"> 
          <option value="" disabled>Select a type</option>
          <option *ngFor="let expenseType of expenseTypes" [value]="expenseType.id">
            {{ expenseType.code }}
          </option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <div class="flex-center">
      <div class="ml-auto flex-center gap-sm">
        <button type="submit" class="btn btn-primary" [disabled]="expenseForm.invalid">
          {{ isEditing ? 'Save Changes' : 'Submit' }}
        </button>
      </div>
    </div>

  </div>
</form>
