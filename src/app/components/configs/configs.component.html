<div class="page-header">
  <div>
    <div class="page-title">Configuration</div>
    <div class="page-subtitle">Manage your system and integration settings</div>
  </div>
  <button class="btn btn-primary">Save Changes</button>
</div>

<!-- General Settings -->
<div class="card">
  <div class="card-title">⚙️ General</div>
  <div class="form-row">
    <div class="form-group">
      <label>Timezone</label>
      <select>
        <option>GMT+1</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date Format</label>
      <select>
        <option>dd/MM/yyyy</option>
      </select>
    </div>
  </div>
  <div class="flex-center gap-md">
    <label class="toggle-label">
      <span class="toggle"><input type="checkbox" /><span class="toggle-slider"></span></span>
      Enable Multi-Currency
    </label>
    <label class="toggle-label">
      <span class="toggle"><input type="checkbox" /><span class="toggle-slider"></span></span>
      Enable Discounts
    </label>
  </div>
</div>

<!-- Invoice Delivery -->
<div class="card">
  <div class="card-title">📨 Invoice Delivery</div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active">FTP</button>
    <button class="tab">Email</button>
    <button class="tab">Folder</button>
  </div>

  <!-- FTP Tab Content -->
  <div class="form-row">
    <div class="form-group">
      <label>FTP Server</label>
      <input type="text" placeholder="ftp://127.0.0.1" />
    </div>
    <div class="form-group">
      <label>FTP Port</label>
      <input type="number" placeholder="21" />
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Username</label>
      <input type="text" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" />
    </div>
  </div>
