<div class="modal-header">
    <span class="modal-title">New Currency</span>
    <button type="button" class="btn btn-secondary btn-sm" (click)="close.emit()">✕</button>
</div>

<div class="modal-body">
    <form [formGroup]="currencyForm">

        <div class="form-group">
            <label>Name</label>
            <input type="text" formControlName="name" placeholder="Euro, US Dollar..." />
            <small class="error-message"
                *ngIf="currencyForm.controls['name'].invalid && currencyForm.controls['name'].touched">
                Name is required (min. 2 characters).
            </small>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Acronym</label>
                <input type="text" formControlName="acronym" placeholder="EUR, USD..." />
                <small class="error-message"
                    *ngIf="currencyForm.controls['acronym'].invalid && currencyForm.controls['acronym'].touched">
                    Acronym is required (max. 5 characters).
                </small>
            </div>
            <div class="form-group">
                <label>Symbol</label>
                <input type="text" formControlName="symbol" placeholder="€, $..." />
                <small class="error-message"
                    *ngIf="currencyForm.controls['symbol'].invalid && currencyForm.controls['symbol'].touched">
                    Symbol is required (max. 5 characters).
                </small>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Culture Code</label>
                <input type="text" formControlName="cultureCode" placeholder="en-US, pt-PT..." />
                <small class="error-message"
                    *ngIf="currencyForm.controls['cultureCode'].invalid && currencyForm.controls['cultureCode'].touched">
                    Culture code is required.
                </small>
            </div>
            <div class="form-group">
                <label>Decimal Places</label>
                <input type="number" formControlName="decimalPlaces" />
            </div>
        </div>

         <div class="form-row">
            <div class="form-group">
                <label>Country</label>
                <input type="text" formControlName="country" placeholder="Portugal, England..." />           
            </div>
        </div>

        <div class="flex-center gap-md" style="margin-top: 0.5rem; margin-bottom: 0.5rem;">
            <label class="toggle-label">
                <span class="toggle">
                    <input type="checkbox" formControlName="isCrypto" />
                    <span class="toggle-slider"></span>
                </span>
                Is Cryptocurrency
            </label>
        </div>

    </form>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="close.emit()">Cancel</button>
    <button type="button" class="btn btn-primary" [disabled]="currencyForm.invalid" (click)="onSubmit()">
        Create
    </button>
</div>
