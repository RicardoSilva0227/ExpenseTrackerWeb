
<div class="page-header">
  <div>
    <div class="page-title">
      {{ isEditing ? 'Edit Expense Type' : 'Add Expense Type' }}
      <span *ngIf="id" class="badge badge-warning" style="margin-left: 0.5rem;">Editing</span>
    </div>
    <div class="page-subtitle">Fill in the details below</div>
  </div>
  <button type="button" class="btn btn-secondary" (click)="goBack()">Back</button>
</div>


<form [formGroup]="expenseTypesForm" (ngSubmit)="onSubmit(this.expenseTypesForm.value)" *ngIf="expenseTypesForm">

<div class="card">
    <div class="form-row">
      <div class="form-group">
        <label>Code</label>
        <input type="text" formControlName="code" />
        <small class="error-message"
          *ngIf="expenseTypesForm.controls['code'].invalid && expenseTypesForm.controls['code'].touched">
          Code is required (min. 3 characters).
        </small>
      </div>
      <div class="form-group">
        <label>Icon</label>
        <input type="text" formControlName="icon" />
        <small class="error-message"
          *ngIf="expenseTypesForm.controls['icon'].invalid && expenseTypesForm.controls['icon'].touched">
          Icon is required.
        </small>
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <input type="text" formControlName="description" />
      <small class="error-message"
        *ngIf="expenseTypesForm.controls['description'].invalid && expenseTypesForm.controls['description'].touched">
        Description is required.
      </small>
    </div>

    <div class="divider"></div>

    <div class="flex-center">
      <div class="ml-auto flex-center gap-sm">
        <button type="submit" class="btn btn-primary" [disabled]="expenseTypesForm.invalid">
          {{ isEditing ? 'Save Changes' : 'Submit' }}
        </button>
      </div>
    </div>

  </div>
</form>
